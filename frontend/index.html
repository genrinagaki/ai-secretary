<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI秘書</title>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root{--ink:#1a1a18;--paper:#f5f2eb;--cream:#ede9df;--accent:#c8553d;--rule:#d4cfc4;--secretary:#2c4a3e;--secretary-bg:#e8ede9;--user-bg:#fff9f2;--success:#4caf82}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--paper);color:var(--ink);font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center}
    header{width:100%;max-width:720px;padding:1.8rem 1.5rem 1.2rem;border-bottom:1.5px solid var(--rule);display:flex;align-items:center;gap:1rem}
    .header-badge{width:40px;height:40px;background:var(--secretary);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .header-badge svg{width:20px;height:20px;stroke:#fff;fill:none}
    .header-text h1{font-family:'Shippori Mincho',serif;font-size:1.3rem;font-weight:600;letter-spacing:.02em}
    .header-text p{font-size:.65rem;color:#999;letter-spacing:.06em;margin-top:2px}
    .status-dot{width:7px;height:7px;background:var(--success);border-radius:50%;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .auth-banner{width:100%;max-width:720px;padding:.9rem 1.5rem;background:#fff8e8;border-bottom:1.5px solid #e8d99a;display:flex;align-items:center;justify-content:space-between;gap:1rem}
    .auth-banner p{font-size:.75rem;color:#7a6a20}
    .btn-google{display:flex;align-items:center;gap:8px;background:var(--secretary);color:#fff;border:none;padding:.55rem 1.1rem;font-family:'DM Mono',monospace;font-size:.72rem;cursor:pointer;border-radius:2px;transition:background .15s}
    .btn-google:hover{background:#1e3329}
    .auth-connected{width:100%;max-width:720px;padding:.7rem 1.5rem;background:#edf7f2;border-bottom:1.5px solid #b8deca;display:flex;align-items:center;gap:8px;font-size:.68rem;color:#2c6b4a}
    .chat-wrapper{width:100%;max-width:720px;flex:1;display:flex;flex-direction:column;padding:0 1.5rem}
    .chat-messages{flex:1;padding:1.8rem 0;display:flex;flex-direction:column;gap:1.4rem;min-height:380px;max-height:55vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--rule) transparent}
    .msg{display:flex;gap:.75rem;max-width:90%;animation:fadeUp .3s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .msg.secretary{align-self:flex-start}
    .msg.user{align-self:flex-end;flex-direction:row-reverse}
    .msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:500}
    .secretary .msg-avatar{background:var(--secretary);color:#fff}
    .user .msg-avatar{background:var(--accent);color:#fff}
    .msg-body{display:flex;flex-direction:column;gap:3px}
    .msg-label{font-size:.58rem;letter-spacing:.08em;color:#aaa;text-transform:uppercase}
    .user .msg-label{text-align:right}
    .msg-bubble{padding:.8rem 1rem;border-radius:2px;font-size:.8rem;line-height:1.75;white-space:pre-wrap}
    .secretary .msg-bubble{background:var(--secretary-bg);border-left:3px solid var(--secretary)}
    .user .msg-bubble{background:var(--user-bg);border-right:3px solid var(--accent)}
    .msg-bubble.success{background:#edf7f2;border-left:3px solid var(--success)}
    .msg-bubble.success a{color:var(--secretary);word-break:break-all}
    .typing-indicator{display:flex;align-items:center;gap:4px;padding:.65rem .9rem;background:var(--secretary-bg);border-left:3px solid var(--secretary);width:fit-content}
    .typing-dot{width:5px;height:5px;background:var(--secretary);border-radius:50%;animation:bounce 1.2s infinite}
    .typing-dot:nth-child(2){animation-delay:.2s}
    .typing-dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.6}30%{transform:translateY(-5px);opacity:1}}
    .input-area{padding:1.1rem 0 2rem;border-top:1.5px solid var(--rule)}
    .input-row{display:flex;gap:.6rem;align-items:flex-end}
    .input-field{flex:1;background:#fff;border:1.5px solid var(--rule);border-radius:2px;padding:.75rem 1rem;font-family:'DM Mono',monospace;font-size:.8rem;color:var(--ink);resize:none;outline:none;transition:border-color .2s;line-height:1.5;min-height:46px;max-height:120px}
    .input-field:focus{border-color:var(--secretary)}
    .input-field::placeholder{color:#bbb}
    .send-btn{width:44px;height:44px;background:var(--secretary);border:none;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .1s}
    .send-btn:hover{background:#1e3329}
    .send-btn:active{transform:scale(.96)}
    .send-btn:disabled{background:var(--rule);cursor:not-allowed}
    .send-btn svg{width:17px;height:17px;stroke:#fff;fill:none}
    .quick-examples{margin-top:.7rem;display:flex;flex-wrap:wrap;gap:.45rem}
    .quick-chip{background:var(--cream);border:1px solid var(--rule);border-radius:2px;padding:3px 9px;font-size:.68rem;color:#666;cursor:pointer;transition:all .15s;font-family:'DM Mono',monospace}
    .quick-chip:hover{background:var(--secretary-bg);border-color:var(--secretary);color:var(--secretary)}
    .chat-messages::-webkit-scrollbar{width:3px}
    .chat-messages::-webkit-scrollbar-thumb{background:var(--rule);border-radius:4px}
  </style>
</head>
<body>
<header>
  <div class="header-badge">
    <svg viewBox="0 0 24 24" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><circle cx="12" cy="15" r="2" fill="white" stroke="white"/></svg>
  </div>
  <div class="header-text">
    <h1>AI秘書</h1>
    <p><span class="status-dot"></span>Google Calendar アシスタント</p>
  </div>
</header>
<div class="auth-banner" id="authBanner">
  <p>📌 Googleカレンダーへのアクセスを許可してください</p>
  <button class="btn-google" onclick="loginWithGoogle()">
    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M15 3H6a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V8l-5-5z"/><polyline points="15 3 15 8 20 8"/></svg>
    Googleでログイン
  </button>
</div>
<div class="auth-connected" id="authConnected" style="display:none">
  <svg viewBox="0 0 24 24" width="14" height="14" stroke-width="2" stroke="#2c6b4a" fill="none"><polyline points="20 6 9 17 4 12"/></svg>
  Googleカレンダーに接続済みです
</div>
<div class="chat-wrapper">
  <div class="chat-messages" id="chatMessages">
    <div class="msg secretary">
      <div class="msg-avatar">秘</div>
      <div class="msg-body">
        <div class="msg-label">AI秘書</div>
        <div class="msg-bubble">いらっしゃいませ。AI秘書です。

Googleカレンダーへのログインが完了したら、予定の登録・確認をお手伝いできます。

例：「来週月曜の15時から2時間、企画会議を入れてください」</div>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea class="input-field" id="userInput" placeholder="例：明日14時から1時間、田中さんとランチを入れてください" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="quick-examples">
      <div class="quick-chip" onclick="fill('明日の15時から1時間、山田さんとランチを入れてください')">🍱 ランチ予定</div>
      <div class="quick-chip" onclick="fill('来週月曜10時から2時間、全体定例会議を登録してください')">📋 定例会議</div>
      <div class="quick-chip" onclick="fill('今週の予定を教えてください')">📅 今週の予定</div>
      <div class="quick-chip" onclick="fill('今日の空き時間を教えてください')">🔍 空き時間確認</div>
    </div>
  </div>
</div>
<script>
  const BACKEND_URL = 'http://localhost:3001';
  let accessToken = '';
  let chatHistory = [];

  window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('access_token');
    if (token) {
      accessToken = token;
      window.history.replaceState({}, '', window.location.pathname);
      showConnected();
      addMessage('secretary', 'Googleカレンダーへの接続が完了しました！\nどんな予定を入れますか？');
    }
  });

  function showConnected() {
    document.getElementById('authBanner').style.display = 'none';
    document.getElementById('authConnected').style.display = 'flex';
  }

  function loginWithGoogle() {
    window.location.href = BACKEND_URL + '/auth/google';
  }

  function fill(text) {
    const el = document.getElementById('userInput');
    el.value = text;
    autoResize(el);
    el.focus();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function addMessage(role, text, isSuccess) {
    const container = document.getElementById('chatMessages');
    const isSecretary = role === 'secretary';
    const msg = document.createElement('div');
    msg.className = 'msg ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = isSecretary ? '秘' : '私';
    const body = document.createElement('div');
    body.className = 'msg-body';
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = isSecretary ? 'AI秘書' : 'あなた';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble' + (isSuccess ? ' success' : '');
    const linked = text.replace(/(https:\/\/calendar\.google\.com[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    bubble.innerHTML = linked.replace(/\n/g, '<br>');
    body.appendChild(label);
    body.appendChild(bubble);
    msg.appendChild(avatar);
    msg.appendChild(body);
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('chatMessages');
    const el = document.createElement('div');
    el.className = 'msg secretary';
    el.id = 'typingIndicator';
    el.innerHTML = '<div class="msg-avatar">秘</div><div class="msg-body"><div class="msg-label">AI秘書</div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    if (!accessToken) {
      addMessage('secretary', '⚠️ まず「Googleでログイン」ボタンでカレンダーへのアクセスを許可してください。');
      return;
    }
    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    chatHistory.push({ role: 'user', content: text });
    showTyping();
    try {
      const res = await fetch(BACKEND_URL + '/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: chatHistory, accessToken }),
      });
      const data = await res.json();
      removeTyping();
      if (data.error) {
        addMessage('secretary', '⚠️ エラー: ' + data.error);
      } else {
        const isSuccess = data.reply.includes('登録完了');
        addMessage('secretary', data.reply, isSuccess);
        chatHistory.push({ role: 'assistant', content: data.reply });
      }
    } catch (err) {
      removeTyping();
      addMessage('secretary', '⚠️ サーバーに接続できません。\nバックエンドサーバーが起動しているか確認してください。\n\n詳細: ' + err.message);
    }
    document.getElementById('sendBtn').disabled = false;
  }
</script>
</body>
</html>
